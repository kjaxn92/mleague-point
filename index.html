<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>点数テロップジェネレーター</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#c9a84c;--gold-l:#f0d080;--red:#e05252;--cyan:#4ecdc4;
  --panel:#0f1016;--b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);
  --dim:rgba(255,255,255,0.32);
}
body{background:#0a0b12;font-family:'Noto Sans JP',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;}
header{display:flex;align-items:center;gap:12px;padding:12px 22px;background:rgba(7,8,15,.96);border-bottom:1px solid var(--b1);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:5px;color:var(--gold);}
.sub{font-size:.58rem;letter-spacing:3px;color:#2c2c3a;}
.sp{flex:1;}
.dlbtn{display:flex;align-items:center;gap:7px;background:var(--gold);color:#000;border:none;font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:3px;padding:8px 20px;cursor:pointer;transition:.15s;white-space:nowrap;}
.dlbtn:hover{background:var(--gold-l);}
.dlbtn svg{width:12px;height:12px;flex-shrink:0;}
.layout{display:flex;flex:1;}
aside{width:290px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--b1);padding:20px 14px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;}
.stitle{font-size:.56rem;letter-spacing:4px;color:#2a2a38;text-transform:uppercase;border-bottom:1px solid var(--b1);padding-bottom:5px;margin-bottom:4px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg em{font-size:.61rem;color:var(--dim);letter-spacing:1px;font-style:normal;}
input[type=text]{background:rgba(255,255,255,.04);border:1px solid var(--b2);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:.8rem;padding:7px 9px;width:100%;outline:none;transition:border .15s;}
input[type=text]:focus{border-color:var(--gold);}
.tog{display:flex;gap:2px;background:rgba(255,255,255,.03);border:1px solid var(--b2);padding:2px;}
.tog button{flex:1;background:transparent;border:none;color:var(--dim);font-size:.68rem;letter-spacing:1px;padding:5px 3px;cursor:pointer;transition:.15s;font-family:inherit;}
.tog button.on{background:var(--gold);color:#000;}
.crow{display:flex;align-items:center;gap:8px;}
.crow input[type=color]{width:34px;height:34px;border:1px solid var(--b2);background:none;cursor:pointer;padding:2px;}
.crow .hi{flex:1;}
.bgtog{display:flex;gap:2px;background:rgba(255,255,255,.03);border:1px solid var(--b2);padding:2px;}
.bgtog button{flex:1;background:transparent;border:none;color:var(--dim);font-size:.63rem;letter-spacing:1px;padding:5px;cursor:pointer;transition:.15s;font-family:inherit;}
.bgtog button.on{background:rgba(255,255,255,.1);color:#fff;}
.pswrap{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.ps{width:22px;height:22px;cursor:pointer;border:1px solid rgba(255,255,255,.1);transition:transform .1s;}
.ps:hover{transform:scale(1.15);}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:36px 20px;overflow:auto;background:repeating-linear-gradient(45deg,#0b0c14 0,#0b0c14 10px,#0c0d16 10px,#0c0d16 20px);transition:background .3s;}
main.lb{background:repeating-linear-gradient(45deg,#c6c6c6 0,#c6c6c6 10px,#cecece 10px,#cecece 20px);}
main.gb{background:#00b140;}
.pnote{font-size:.56rem;letter-spacing:3px;color:#252530;text-transform:uppercase;}
#telop{background:transparent;display:inline-block;}
.card{display:flex;align-items:stretch;overflow:hidden;background:rgba(8,9,16,.95);border:1px solid rgba(255,255,255,.06);border-left:none;min-width:340px;}
.stripe{width:4px;background:#c9a84c;flex-shrink:0;}
.inner{flex:1;display:flex;align-items:center;padding:13px 16px 13px 13px;}
.info{flex:1;display:flex;flex-direction:column;gap:3px;}
.pname{font-size:.95rem;font-weight:700;letter-spacing:2px;line-height:1.2;}
.tname{font-size:.58rem;letter-spacing:1px;color:rgba(255,255,255,.3);}
.right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;padding-left:16px;flex-shrink:0;}
.delta{font-family:'Rajdhani',sans-serif;font-size:.73rem;font-weight:600;letter-spacing:1px;}
.delta.up{color:#4ecdc4;}.delta.down{color:#e05252;}.delta.zero{color:rgba(255,255,255,.3);}
.srow{display:flex;align-items:baseline;gap:4px;}
.pts{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;line-height:1;letter-spacing:1px;}
.pts.hi{color:#f0d080;}.pts.lo{color:#e05252;}.pts.mi{color:#fff;}
.unit{font-family:'Rajdhani',sans-serif;font-size:.68rem;letter-spacing:2px;color:rgba(255,255,255,.28);padding-bottom:1px;}
.st{font-size:.6rem;letter-spacing:2px;color:#252530;min-height:16px;text-align:center;transition:color .2s;}
.st.ok{color:#5ec45e;}.st.wk{color:var(--gold);}
</style>
</head>
<body>
<header>
  <div class="logo">MLEAGUE</div>
  <div class="sub">点数テロップ</div>
  <div class="sp"></div>
  <button class="dlbtn" onclick="dl()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v13M7 11l5 5 5-5M3 20h18"/></svg>
    PNG 出力
  </button>
</header>

<div class="layout">
  <aside>
    <div>
      <div class="stitle">選手情報</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
        <div class="fg"><em>選手名</em><input type="text" id="nm" value="松本 吉弘" oninput="r()"></div>
        <div class="fg"><em>チーム名</em><input type="text" id="tm" value="KONAMI 麻雀格闘倶楽部" oninput="r()"></div>
      </div>
    </div>
    <div>
      <div class="stitle">点数</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
        <div class="fg"><em>現在の点数（例: 38,200）</em><input type="text" id="pts" value="38,200" oninput="r()"></div>
        <div class="fg"><em>増減（例: +12,000 / −8,000）</em><input type="text" id="dlt" value="+12,000" oninput="r()"></div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <em style="font-size:.61rem;color:var(--dim);letter-spacing:1px;">増減方向</em>
          <div class="tog">
            <button id="bu" class="on" onclick="sd('up')">▲ 増</button>
            <button id="bd" onclick="sd('down')">▼ 減</button>
            <button id="bz" onclick="sd('zero')">— 同</button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <em style="font-size:.61rem;color:var(--dim);letter-spacing:1px;">点数の色</em>
          <div class="tog">
            <button id="ca" class="on" onclick="scol('auto')">自動</button>
            <button id="ch" onclick="scol('hi')">金</button>
            <button id="cm" onclick="scol('mi')">白</button>
            <button id="cl" onclick="scol('lo')">赤</button>
          </div>
        </div>
      </div>
    </div>
    <div>
      <div class="stitle">ストライプカラー</div>
      <div style="margin-top:8px;">
        <div class="crow">
          <input type="color" id="cp" value="#c9a84c" oninput="sy('p')">
          <input type="text" class="hi" id="chx" value="#c9a84c" oninput="sy('t')" maxlength="7">
        </div>
        <div class="pswrap">
          <div class="ps" onclick="scolor('#c9a84c')" style="background:#c9a84c;"></div>
          <div class="ps" onclick="scolor('#9f9f9f')" style="background:#9f9f9f;"></div>
          <div class="ps" onclick="scolor('#e05252')" style="background:#e05252;"></div>
          <div class="ps" onclick="scolor('#4ecdc4')" style="background:#4ecdc4;"></div>
          <div class="ps" onclick="scolor('#5b8fd4')" style="background:#5b8fd4;"></div>
          <div class="ps" onclick="scolor('#c060e0')" style="background:#c060e0;"></div>
          <div class="ps" onclick="scolor('#5ec45e')" style="background:#5ec45e;"></div>
          <div class="ps" onclick="scolor('#ffffff')" style="background:#fff;"></div>
        </div>
      </div>
    </div>
    <div>
      <div class="stitle">プレビュー背景</div>
      <div style="margin-top:8px;">
        <div class="bgtog">
          <button class="on" onclick="sbg('d',this)">暗</button>
          <button onclick="sbg('l',this)">明</button>
          <button onclick="sbg('g',this)">緑幕</button>
        </div>
        <div style="font-size:.55rem;color:#2a2a36;margin-top:6px;letter-spacing:1px;">※ PNG出力は背景透過</div>
      </div>
    </div>
  </aside>

  <main id="ma">
    <div class="pnote">プレビュー</div>
    <div id="telop">
      <div class="card">
        <div class="stripe" id="stripe"></div>
        <div class="inner">
          <div class="info">
            <div class="pname" id="tn">松本 吉弘</div>
            <div class="tname" id="tt">KONAMI 麻雀格闘倶楽部</div>
          </div>
          <div class="right">
            <div class="delta up" id="td">▲ +12,000</div>
            <div class="srow">
              <div class="pts hi" id="tp">38,200</div>
              <div class="unit">点</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="st" id="ss"></div>
  </main>
</div>

<script>
let dir='up', col='auto';
function r(){
  document.getElementById('tn').textContent=document.getElementById('nm').value||'選手名';
  document.getElementById('tt').textContent=document.getElementById('tm').value||'チーム名';
  const pv=document.getElementById('pts').value||'0';
  const dv=document.getElementById('dlt').value||'0';
  const pe=document.getElementById('tp');
  pe.textContent=pv;
  if(col==='auto'){
    const n=parseFloat(pv.replace(/[,，]/g,''));
    pe.className='pts '+(isNaN(n)?'mi':n>=30000?'hi':n>=20000?'mi':'lo');
  }else{pe.className='pts '+col;}
  const de=document.getElementById('td');
  de.textContent=(dir==='up'?'▲':dir==='down'?'▼':'—')+' '+dv;
  de.className='delta '+dir;
}
function sd(d){
  dir=d;
  ['up','down','zero'].forEach(x=>document.getElementById('b'+x[0]).classList.toggle('on',x===d));
  r();
}
function scol(c){
  col=c;
  ['auto','hi','mi','lo'].forEach(x=>document.getElementById('c'+x[0]).classList.toggle('on',x===c));
  r();
}
function sy(from){
  if(from==='p'){const v=document.getElementById('cp').value;document.getElementById('chx').value=v;document.getElementById('stripe').style.background=v;}
  else{const v=document.getElementById('chx').value;if(/^#[0-9a-fA-F]{6}$/.test(v)){document.getElementById('cp').value=v;document.getElementById('stripe').style.background=v;}}
}
function scolor(hex){
  document.getElementById('cp').value=hex;
  document.getElementById('chx').value=hex;
  document.getElementById('stripe').style.background=hex;
}
function sbg(m,btn){
  document.getElementById('ma').className='main'+(m==='l'?' lb':m==='g'?' gb':'');
  document.querySelectorAll('.bgtog button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
async function dl(){
  const s=document.getElementById('ss');
  s.textContent='生成中...';s.className='st wk';
  try{
    const canvas=await html2canvas(document.getElementById('telop'),{scale:3,backgroundColor:null,useCORS:true,logging:false});
    const a=document.createElement('a');
    a.download='score_'+(document.getElementById('nm').value||'player').replace(/\s/g,'_')+'.png';
    a.href=canvas.toDataURL('image/png');a.click();
    s.textContent='✓ 完了';s.className='st ok';
    setTimeout(()=>{s.textContent='';s.className='st';},3000);
  }catch(e){s.textContent='エラー';s.className='st';console.error(e);}
}
r();
</script>
</body>
</html>
